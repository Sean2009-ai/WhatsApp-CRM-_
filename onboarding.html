<h2>Créer boutique</h2>

<input id="name" placeholder="Nom boutique"><br><br>
<input id="owner" placeholder="Owner"><br><br>
<input id="phone" placeholder="Téléphone"><br><br>

<button onclick="create()">Créer</button>

<script>
function create(){
    fetch("/create-shop", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            name:document.getElementById("name").value,
            owner:document.getElementById("owner").value,
            phone:document.getElementById("phone").value
        })
    })
    .then(r=>r.json())
    .then(d=>{
        alert("Créé !");
        window.location.href = d.dashboard;
    })
}
</script>
